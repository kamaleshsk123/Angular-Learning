<div class="w-1/2 overflow-x-auto m-3">
  <table class="border w-full">
    <thead class="text-left border-b bg-gray-100">
      <tr>
        <th class="p-2">Name</th>
        <th class="p-2">Email</th>
        <th class="p-2">Phone</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td class="p-2">{{ userDetails.name }}</td>
        <td class="p-2">{{ userDetails.email }}</td>
        <td class="p-2">{{ userDetails.phone }}</td>
      </tr>
    </tbody>
  </table>
</div>
