<div class="m-3 w-1/2">
  <h1 class="font-semibold text-2xl">Add New Book</h1>
  <form [formGroup]="book" (ngSubmit)="onSubmit()" class="mt-3">
    <div class="space-y-2">
      <h1>Book Name:</h1>
      <input
        type="text"
        formControlName="name"
        placeholder="Enter Book Name..."
        class="p-2 border rounded w-full"
      />
      <div *ngIf="book.get('name')?.touched && book.get('name')?.invalid">
        <div *ngIf="book.get('name')?.errors?.['required']" class="text-red-500">
          Book's name is Required
        </div>
        <div *ngIf="book.get('name')?.errors?.['minlength']" class="text-red-500">
          Book's name is less then 3 words
        </div>
      </div>
    </div>
    <div class="space-y-2 mt-3">
      <h1>Description:</h1>
      <textarea formControlName="description" class="h-40 p-2 w-full border rounded"></textarea>
      <div *ngIf="book.get('description')?.touched && book.get('description')?.invalid">
        <div *ngIf="book.get('description')?.errors?.['required']" class="text-red-500">
          Description is Required
        </div>
      </div>
    </div>
    <div class="space-x-3">
      <button
        *ngIf="!showUpdate"
        type="submit"
        [disabled]="book.invalid"
        [ngClass]="book.invalid ? 'border' : 'cursor-pointer bg-blue-500 text-white '"
        class="px-4 py-2 mt-3 rounded"
      >
        Add Book
      </button>
      <button
        type="button"
        *ngIf="showUpdate"
        class="bg-blue-500 text-white px-4 py-2 rounded cursor-pointer"
        (click)="updateDetails()"
      >
        Update Book Details
      </button>
      <button
        *ngIf="showUpdate"
        type="button"
        class="border rounded px-4 py-2 cursor-pointer"
        (click)="cancelUpdate()"
      >
        Cancel
      </button>
    </div>
  </form>
</div>

<div *ngIf="booksList.length > 0" class="w-1/2 m-3">
  <div class="w-full border border-gray-100 my-3"></div>
  <h1 class="font-semibold text-2xl">Library</h1>
  <div class="flex justify-between items-end">
    <h1>Total Books in Library: {{ loadBooks.length }}</h1>
    <input
      type="search"
      [(ngModel)]="searchTerm"
      class="border p-2 w-56 rounded"
      placeholder="Search by Book Name..."
    />
  </div>
  <table class="border w-full mt-3">
    <thead class="bg-gray-100 text-left">
      <tr>
        <th class="p-2">Book Name</th>
        <th class="p-2">Description</th>
        <th class="p-2">Action</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let book of loadBooks; let i = index">
        <td class="p-2">{{ book.name }}</td>
        <td class="p-2">{{ book.description }}</td>
        <td class="p-2">
          <button class="p-2 text-blue-500 cursor-pointer" (click)="editBook(i)">Edit</button>
          <button class="p-2 text-red-500 cursor-pointer" (click)="deleteBook(book.id)">
            Delete
          </button>
        </td>
      </tr>
    </tbody>
  </table>
  <div *ngIf="loadBooks.length === 0" class="text-center text-gray-400 pt-2">
    No Books in the searched name
  </div>
</div>
