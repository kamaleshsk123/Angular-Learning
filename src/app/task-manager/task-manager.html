<div class="m-3 w-1/2">
  <h1 class="text-2xl font-semibold">Task Manager Application</h1>
  <form [formGroup]="task" class="space-y-3">
    <div class="mt-2">
      <h1>Title:</h1>
      <input
        type="text"
        formControlName="title"
        placeholder="Enter the Task Title..."
        class="border p-2 rounded w-full"
      />
    </div>
    <div>
      <h1>Description:</h1>
      <textarea
        formControlName="description"
        class="rounded border p-2 w-full h-40"
        placeholder="Description..."
      ></textarea>
    </div>
    <div>
      <h1>Status</h1>
      <mat-radio-group formControlName="status">
        <mat-radio-button value="pending">Pending</mat-radio-button>
        <mat-radio-button value="complete">Complete</mat-radio-button>
      </mat-radio-group>
    </div>
    <div class="space-x-3">
      <button
        *ngIf="!showUpdate"
        [disabled]="task.invalid"
        [ngClass]="task.invalid ? 'border' : 'bg-blue-500 text-white cursor-pointer'"
        type="submit"
        (click)="submitTask()"
        class="px-4 py-2 rounded"
      >
        Add a new Task
      </button>
      <button
        *ngIf="showUpdate"
        class="bg-blue-500 text-white px-4 py-2 rounded"
        (click)="updateTask()"
      >
        Update Task
      </button>
      <button
        *ngIf="showUpdate"
        class="border rounded px-4 py-2 cursor-pointer"
        (click)="cancelUpdate()"
      >
        Cancel
      </button>
    </div>
  </form>
</div>
<div *ngIf="taskList.length > 0" class="w-1/2 m-3">
  <table class="border w-full">
    <thead class="bg-gray-200 text-left">
      <tr>
        <th class="p-2">Title</th>
        <th class="p-2">Description</th>
        <th class="p-2">Status</th>
        <th class="p-2">Action</th>
      </tr>
    </thead>
    <tbody *ngFor="let task of taskList; let i = index">
      <tr>
        <td class="p-2">{{ task.title }}</td>
        <td class="p-2">{{ task.description }}</td>
        <td class="p-2 capitalize">{{ task.status }}</td>
        <td class="space-x-3">
          <button class="text-blue-500 cursor-pointer" (click)="editTask(i)">Edit</button>
          <button class="text-red-500 cursor-pointer" (click)="deleteTask(i)">Delete</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
