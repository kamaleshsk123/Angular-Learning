<section class="w-full m-5 flex space-x-5">
  <section class="border w-1/2 border-gray-400 rounded p-5">
    Create New User
    <div>
      <h1>Name:</h1>
      <input [(ngModel)]="userName" class="border rounded border-gray-400" type="text" />
    </div>
    <div>
      <h1>Age:</h1>
      <input [(ngModel)]="userAge" class="border rounded border-gray-400" type="number" />
    </div>
    <div class="flex space-x-3">
      <button
        [disabled]="!this.userName || !this.userAge"
        [ngClass]="
          !this.userName || !this.userAge ? 'border text-slate-400' : 'text-white bg-sky-400'
        "
        class="px-4 py-2 mt-3 rounded"
        (click)="submitButton()"
      >
        Save Button
      </button>
      <button class="px-4 py-2 mt-3 rounded border text-black" (click)="resetButton()">
        Reset Button
      </button>
    </div>
  </section>
  <section class="border w-1/2 border-gray-400 rounded p-5">
    <div
      *ngIf="users.length === 0"
      class="flex justify-center items-center content-center h-40 text-gray-400"
    >
      No Data Available
    </div>
    <div *ngIf="users.length > 0">
      <div *ngFor="let item of users; let i = index">
        <div>
          <h1>
            Name: <span>{{ item.name }}</span>
          </h1>
        </div>
        <div>
          <h1>
            Age:
            <span [ngClass]="item.age < 18 ? 'text-red-500' : 'text-green-500'">{{
              item.age
            }}</span>
          </h1>
        </div>
        <div>
          <h1>
            Hi, {{ item.name }}, You are
            <span [ngClass]="item.age < 18 ? 'text-red-500' : 'text-green-500'">{{
              item.age
            }}</span>
            years old!
          </h1>
        </div>
        <button class="bg-red-500 px-4 py-2 text-white rounded" (click)="deleteUser(i)">
          Delete {{ item.name }}
        </button>
      </div>
    </div>
  </section>
</section>
